name: Pipeline CI/CD TP Master

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - develop
      - main

env:
  IMAGE_BACKEND: masterapp-backend
  IMAGE_FRONTEND: masterapp-frontend
  REPO_URL: ghcr.io

jobs:
  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: install dependencies
        run: cd backend && npm install

      - name: run linting
        run: cd backend && npx eslint src/ || true

      - name: run tests
        run: cd backend && npm test

  build:
    name: build and push
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: build backend image
        run: docker build -t $IMAGE_BACKEND ./backend
      - name: build frontend image
        run: docker build -t $IMAGE_FRONTEND ./frontend

      - name: tag backend image on ghcr
        run: |
          docker tag $IMAGE_BACKEND $REPO_URL/${{ github.actor }}/$IMAGE_BACKEND:1.0
          docker tag $IMAGE_BACKEND $REPO_URL/${{ github.actor }}/$IMAGE_BACKEND:latest
      - name: tag frontend image on ghcr
        run: |
          docker tag $IMAGE_FRONTEND $REPO_URL/${{ github.actor }}/$IMAGE_FRONTEND:1.0
          docker tag $IMAGE_FRONTEND $REPO_URL/${{ github.actor }}/$IMAGE_FRONTEND:latest

      - name: connexion GHCR
        uses: docker/login-action@v2
        with:
          registry: ${{ env.REPO_URL }}
          username: ${{ github.actor }}
          password: ${{ secrets.TOKENCICD }}

      - name: push backend image on ghcr
        run: |
          docker push $REPO_URL/${{ github.actor }}/$IMAGE_BACKEND:1.0
          docker push $REPO_URL/${{ github.actor }}/$IMAGE_BACKEND:latest
      - name: push frontend image on ghcr
        run: |
          docker push $REPO_URL/${{ github.actor }}/$IMAGE_FRONTEND:1.0
          docker push $REPO_URL/${{ github.actor }}/$IMAGE_FRONTEND:latest

  deploy:
    name: deploy
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: connect to AWS VPS
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.KEY }}
          port: ${{ secrets.PORT }}
          envs: REPO_URL,IMAGE_BACKEND,IMAGE_FRONTEND
          script: |
            docker --version
            echo ${{secrets.TOKENCICD}} | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker stop $IMAGE_BACKEND || true
            docker stop $IMAGE_FRONTEND || true
            docker rm $IMAGE_BACKEND || true
            docker rm $IMAGE_FRONTEND || true
            docker pull $REPO_URL/${{ github.actor }}/$IMAGE_BACKEND:latest
            docker pull $REPO_URL/${{ github.actor }}/$IMAGE_FRONTEND:latest
            docker network create masterapp-net || true
            docker run -d -p 3000:3000 --name $IMAGE_BACKEND --network masterapp-net $REPO_URL/${{ github.actor }}/$IMAGE_BACKEND:latest
            docker run -d -p 8080:80 --name $IMAGE_FRONTEND --network masterapp-net $REPO_URL/${{ github.actor }}/$IMAGE_FRONTEND:latest
            sleep 3
            curl localhost:3000/api/health
            curl localhost:8080
